<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ice Escape</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="game-container">

      <canvas id="snow-canvas" width="400" height="600"></canvas>

      <!-- Realistic CSS sun -->
      <div id="sun">
        <svg class="sun-rays-svg" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
          <!-- 8 rays -->
          <g stroke="#ffe033" stroke-linecap="round" opacity="0.85">
            <line x1="30" y1="2"  x2="30" y2="10" stroke-width="2.5"/>
            <line x1="30" y1="50" x2="30" y2="58" stroke-width="2.5"/>
            <line x1="2"  y1="30" x2="10" y2="30" stroke-width="2.5"/>
            <line x1="50" y1="30" x2="58" y2="30" stroke-width="2.5"/>
            <line x1="8"  y1="8"  x2="14" y2="14" stroke-width="2"/>
            <line x1="46" y1="46" x2="52" y2="52" stroke-width="2"/>
            <line x1="52" y1="8"  x2="46" y2="14" stroke-width="2"/>
            <line x1="14" y1="46" x2="8"  y2="52" stroke-width="2"/>
          </g>
        </svg>
        <div class="sun-core"></div>
      </div>

      <!-- Start Screen -->
      <div id="start-screen" class="overlay">
        <h1>🧊 Ice Escape</h1>
        <p>Avoid the sun rays &nbsp;💛<br/>Collect the snowflakes ❄️</p>
        <p class="highscore-label">🏆 Best: <span id="start-highscore">0</span></p>
        <button id="start-btn">Start Game</button>
      </div>

      <!-- Game Screen -->
      <div id="game-screen" class="hidden">
        <div id="hud">
          <span id="score-display">Score: 0</span>
          <span id="level-display">Level 1</span>
          <span id="hp-display"></span>
        </div>
        <button id="pause-btn" title="Pause (ESC)">⏸</button>
        <div id="player"></div>
      </div>

      <!-- Pause Screen -->
      <div id="pause-screen" class="overlay hidden">
        <h1>⏸ Paused</h1>
        <p>Press <strong>ESC</strong> or click Resume to continue</p>
        <button id="resume-btn">▶ Resume</button>
      </div>

      <!-- Game Over Screen -->
      <div id="gameover-screen" class="overlay hidden">
        <h1>💧 Melted!</h1>
        <p>Your score: <span id="final-score">0</span></p>
        <p class="highscore-label">🏆 Best: <span id="gameover-highscore">0</span></p>
        <button id="restart-btn">Play Again</button>
      </div>

    </div>
    <script src="game.js"></script>
  </body>
</html>
